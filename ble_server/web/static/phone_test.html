<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CUKTECH AD1204U</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --c1-color: #2196F3; --c2-color: #651FFF; --c3-color: #4CAF50; --a-color: #FF9800;
    --bg: #1b1b20; --card-bg: rgba(255,255,255,0.04); --text: #e8e8ec; --text-dim: #999;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; overflow-x: hidden;
}

/* Phone Frame */
.phone {
    width: 100%; max-width: 430px; min-height: 100vh;
    background: linear-gradient(180deg, #1b1b20 0%, #121215 100%);
    position: relative; overflow-x: hidden;
    padding-bottom: 24px;
}

/* Top Bar */
.topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; position: relative; z-index: 10;
}
.topbar-back { width: 32px; height: 32px; cursor: pointer; opacity: 0.7; }
.topbar-back img { width: 100%; height: 100%; }
.topbar-title { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
.topbar-menu { width: 28px; height: 28px; cursor: pointer; opacity: 0.6; }
.topbar-menu img { width: 100%; height: 100%; }

/* Device Area */
.device-area {
    position: relative; width: 100%; height: 380px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 8px;
}

/* Ellipse animation rings */
.ellipse-container {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); pointer-events: none;
}
.ellipse-ring { position: absolute; border-radius: 50%; opacity: 0; }
.ellipse-ring.charging { animation: ellipseSpin 3s linear infinite; opacity: 1; }
.ellipse-ring:nth-child(1) {
    width: 240px; height: 240px; margin: -120px 0 0 -120px;
    border: 1px solid rgba(33,150,243,0.25);
    animation-delay: 0s; animation-duration: 4s;
}
.ellipse-ring:nth-child(2) {
    width: 200px; height: 200px; margin: -100px 0 0 -100px;
    border: 1px solid rgba(101,31,255,0.2);
    animation-delay: -1s; animation-duration: 3.5s;
}
.ellipse-ring:nth-child(3) {
    width: 160px; height: 160px; margin: -80px 0 0 -80px;
    border: 1px solid rgba(76,175,80,0.3);
    animation-delay: -2s; animation-duration: 3s;
}
@keyframes ellipseSpin {
    0% { transform: rotate(0deg) scale(0.85); opacity: 0.6; }
    50% { transform: rotate(180deg) scale(1.1); opacity: 1; }
    100% { transform: rotate(360deg) scale(0.85); opacity: 0.6; }
}

/* Device image */
.device-img-wrap {
    position: relative; z-index: 2; transition: transform 0.3s ease;
}
.device-img-wrap.charging {
    animation: devicePulse 2s ease-in-out infinite;
}
@keyframes devicePulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.02); filter: brightness(1.08); }
}
.device-img-wrap img {
    width: 220px; height: auto; display: block;
}

/* Power badge */
.power-badge {
    position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
    border-radius: 20px; padding: 5px 16px; display: flex; align-items: center; gap: 6px;
    opacity: 0; transition: all 0.5s ease; z-index: 5; pointer-events: none;
}
.power-badge.visible { opacity: 1; }
.power-badge .power-val { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
.power-badge .power-unit { font-size: 11px; color: var(--text-dim); }
.power-badge .power-icon { width: 16px; height: 16px; }
.power-badge .power-icon img { width: 100%; height: 100%; }

/* Scene Mode Selector */
.scene-selector {
    display: flex; gap: 10px; padding: 0 16px; margin-top: -20px;
    position: relative; z-index: 5; justify-content: center;
}
.scene-btn {
    flex: 1; max-width: 90px; aspect-ratio: 1;
    border-radius: 16px; background: rgba(255,255,255,0.04);
    border: 1.5px solid transparent;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 4px; cursor: pointer;
    transition: all 0.3s ease; padding: 8px 4px;
    position: relative; overflow: hidden;
}
.scene-btn:hover { background: rgba(255,255,255,0.08); }
.scene-btn.active {
    border-color: rgba(33,150,243,0.5);
    background: rgba(33,150,243,0.08);
    box-shadow: 0 0 20px rgba(33,150,243,0.1);
}
.scene-btn img { width: 48px; height: 48px; object-fit: contain; }
.scene-btn .scene-label { font-size: 10px; color: var(--text-dim); text-align: center; }
.scene-btn.active .scene-label { color: #64B5F6; }

/* Port Cards */
.port-cards {
    padding: 16px; display: flex; flex-direction: column; gap: 10px;
    margin-top: 16px;
}
.port-card {
    position: relative; border-radius: 14px; overflow: hidden;
    height: 78px; display: flex; align-items: center;
    padding: 0 16px; cursor: pointer; transition: all 0.3s ease;
}
.port-card-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; border-radius: 14px; z-index: 0;
}
.port-card-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(27,27,32,0.65); z-index: 1; border-radius: 14px;
    transition: background 0.3s;
}
.port-card.active .port-card-overlay { background: rgba(27,27,32,0.35); }
.port-card:hover .port-card-overlay { background: rgba(27,27,32,0.45); }
.port-card-inner {
    position: relative; z-index: 2; display: flex; align-items: center;
    width: 100%; gap: 12px;
}
.port-card-port-icon { width: 52px; height: 32px; flex-shrink: 0; }
.port-card-port-icon img { width: 100%; height: 100%; object-fit: contain; }
.port-card-info { flex: 1; min-width: 0; }
.port-card-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.port-card-stats { font-size: 11px; color: var(--text-dim); display: flex; gap: 8px; }
.port-card-stats .stat-highlight { color: #fff; font-weight: 600; }
.port-card-status {
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    flex-shrink: 0;
}
.port-card-protocol {
    font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.06);
}
.port-card-protocol.idle { color: var(--text-dim); }
.port-card-protocol.pd { color: #2196F3; background: rgba(33,150,243,0.12); }
.port-card-protocol.pps { color: #E040FB; background: rgba(224,64,251,0.12); }
.port-card-protocol.qc { color: #4CAF50; background: rgba(76,175,80,0.12); }
.port-card-watts { font-size: 18px; font-weight: 700; }

/* Connected device icons */
.connected-devices {
    display: flex; gap: 4px; margin-top: 2px;
}
.connected-devices img { width: 18px; height: 18px; opacity: 0.7; }
.connected-devices img.inactive { opacity: 0.2; }

/* Footer info */
.footer-info {
    text-align: center; padding: 20px 16px; font-size: 11px; color: #555;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.footer-info .model { font-size: 12px; color: #777; }

/* Mode banner */
.mode-banner {
    margin: 10px 16px; padding: 12px 16px;
    background: rgba(255,255,255,0.03); border-radius: 12px;
    display: flex; align-items: center; gap: 10px;
    border: 1px solid rgba(255,255,255,0.05);
}
.mode-banner-icon { width: 28px; height: 28px; }
.mode-banner-icon img { width: 100%; height: 100%; }
.mode-banner-text { font-size: 13px; font-weight: 500; }
.mode-banner-sub { font-size: 11px; color: var(--text-dim); }

/* Simulated data controls */
.sim-controls {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    display: flex; flex-direction: column; gap: 6px;
}
.sim-btn {
    padding: 8px 14px; border-radius: 20px; border: none;
    background: rgba(255,255,255,0.1); color: var(--text);
    font-size: 11px; cursor: pointer; backdrop-filter: blur(10px);
    transition: all 0.2s;
}
.sim-btn:hover { background: rgba(255,255,255,0.2); }
.sim-btn.accent { background: rgba(33,150,243,0.3); color: #64B5F6; }

@media (min-width: 431px) {
    body { background: #0a0a0f; align-items: center; }
    .phone {
        border-radius: 24px; min-height: 90vh; max-height: 95vh;
        box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 120px rgba(33,150,243,0.05);
        border: 1px solid rgba(255,255,255,0.06);
    }
}
</style>
</head>
<body>

<div class="phone" id="app">

    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-back">
            <img src="plugin_imgs/main_charger_dark_icon_left.png" alt="back">
        </div>
        <div class="topbar-title">CUKTECH 10 Ultra</div>
        <div class="topbar-menu">
            <img src="plugin_imgs/main_charger_dark_icon_more.png" alt="menu">
        </div>
    </div>

    <!-- Device Area -->
    <div class="device-area">
        <div class="ellipse-container" id="ellipseContainer">
            <div class="ellipse-ring" id="ring1"></div>
            <div class="ellipse-ring" id="ring2"></div>
            <div class="ellipse-ring" id="ring3"></div>
        </div>

        <div class="device-img-wrap" id="deviceImgWrap">
            <img id="deviceImg" src="plugin_imgs/main_charger_light_ad1204_all.png" alt="AD1204U">
        </div>

        <div class="power-badge" id="powerBadge">
            <div class="power-icon"><img src="plugin_imgs/main_charger_dark_power_on.png" alt=""></div>
            <span class="power-val" id="totalPowerVal">0</span>
            <span class="power-unit">W</span>
        </div>
    </div>

    <!-- Scene Mode Selector -->
    <div class="scene-selector" id="sceneSelector">
        <div class="scene-btn active" data-mode="ai" onclick="switchScene('ai')">
            <img src="plugin_imgs/main_charger_dark_ai_on.png" alt="AI">
            <span class="scene-label">AI模式</span>
        </div>
        <div class="scene-btn" data-mode="digital" onclick="switchScene('digital')">
            <img src="plugin_imgs/main_charger_dark_mac_on.png" alt="Digital">
            <span class="scene-label">数码生态</span>
        </div>
        <div class="scene-btn" data-mode="single" onclick="switchScene('single')">
            <img src="plugin_imgs/main_charger_dark_single_on.png" alt="Single">
            <span class="scene-label">单口模式</span>
        </div>
        <div class="scene-btn" data-mode="balance" onclick="switchScene('balance')">
            <img src="plugin_imgs/main_charger_dark_balance_on.png" alt="Balance">
            <span class="scene-label">均衡模式</span>
        </div>
    </div>

    <!-- Mode Banner -->
    <div class="mode-banner" id="modeBanner">
        <div class="mode-banner-icon"><img id="modeBannerIcon" src="plugin_imgs/main_card_scene_icon_ai.png" alt=""></div>
        <div>
            <div class="mode-banner-text" id="modeBannerText">AI模式</div>
            <div class="mode-banner-sub" id="modeBannerSub">自动识别设备智能匹配最优充电功率</div>
        </div>
    </div>

    <!-- Port Cards -->
    <div class="port-cards" id="portCards">
        <!-- Populated by JS -->
    </div>

    <!-- Footer -->
    <div class="footer-info">
        <span>CUKTECH AD1204U GaN Charger Ultra</span>
        <span class="model">njcuk.fitting.ad1204 · FW v3.2.1 · BLE Connected</span>
    </div>

    <!-- Simulation Controls -->
    <div class="sim-controls">
        <button class="sim-btn accent" onclick="toggleCharging()" id="simChargeBtn">开始充电</button>
        <button class="sim-btn" onclick="cycleScenario()">切换场景</button>
        <button class="sim-btn" onclick="toggleDarkMode()">深色/浅色</button>
    </div>
</div>

<script>
// === Mock Data ===
const PORT_CONFIG = {
    c1: { name: 'C1', color: '#2196F3', usbType: 'c', maxW: 140 },
    c2: { name: 'C2', color: '#651FFF', usbType: 'c', maxW: 100 },
    c3: { name: 'C3', color: '#4CAF50', usbType: 'c', maxW: 45 },
    a:  { name: 'A',  color: '#FF9800', usbType: 'a', maxW: 33 }
};

const SCENE_MODES = {
    ai:      { name: 'AI模式', desc: '自动识别设备智能匹配最优充电功率', icon: 'ai' },
    digital: { name: '数码生态', desc: '多口同时充电均衡分配功率', icon: 'apple' },
    single:  { name: '单口模式', desc: '单口最大功率输出优先C1口', icon: 'single' },
    balance: { name: '均衡模式', desc: '多个端口均衡分配充电功率', icon: 'balance' }
};

// Scenarios for demo cycling
const SCENARIOS = [
    // [name, description, ports data]
    { name: '空闲待机', desc: '无设备接入', ports: {
        c1: { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] },
        c2: { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] },
        c3: { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] },
        a:  { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] }
    }},
    { name: '单设备快充', desc: 'MacBook Pro 通过C1口充电', ports: {
        c1: { v: 20.3, a: 4.8, w: 97.4, protocol: 'pd', devices: ['laptop'] },
        c2: { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] },
        c3: { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] },
        a:  { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] }
    }},
    { name: '手机+耳机', desc: 'iPhone通过C2充电，AirPods通过A口', ports: {
        c1: { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] },
        c2: { v: 9.1, a: 2.4, w: 21.8, protocol: 'pd', devices: ['phone'] },
        c3: { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] },
        a:  { v: 5.1, a: 0.4, w: 2.0, protocol: 'idle', devices: ['airpods'] }
    }},
    { name: '多设备满载', desc: 'MacBook + iPad + 手机 + 手表同时充电', ports: {
        c1: { v: 20.1, a: 4.5, w: 90.5, protocol: 'pd', devices: ['laptop'] },
        c2: { v: 9.0, a: 2.8, w: 25.2, protocol: 'pps', devices: ['ipad'] },
        c3: { v: 5.0, a: 2.0, w: 10.0, protocol: 'qc', devices: ['phone'] },
        a:  { v: 5.0, a: 0.3, w: 1.5, protocol: 'idle', devices: ['watch', 'airpods'] }
    }},
    { name: 'PPS快充', desc: '三星手机通过C1口PPS充电', ports: {
        c1: { v: 11.2, a: 4.5, w: 50.4, protocol: 'pps', devices: ['phone'] },
        c2: { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] },
        c3: { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] },
        a:  { v: 0, a: 0, w: 0, protocol: 'idle', devices: [] }
    }}
];

// Device icons
const DEVICE_ICONS = {
    phone:   'phone',
    laptop:  'laptop',
    ipad:    'ipad',
    watch:   'watch',
    airpods: 'airpods'
};

// === State ===
let state = {
    darkMode: true,
    scene: 'ai',
    scenarioIdx: 0,
    ports: JSON.parse(JSON.stringify(SCENARIOS[0].ports)),
    isCharging: false
};

// === Render ===
function applyDarkMode() {
    const root = document.documentElement;
    if (state.darkMode) {
        root.style.setProperty('--bg', '#1b1b20');
        root.style.setProperty('--card-bg', 'rgba(255,255,255,0.04)');
        root.style.setProperty('--text', '#e8e8ec');
        root.style.setProperty('--text-dim', '#999');
        document.getElementById('deviceImg').src = 'plugin_imgs/main_charger_dark_ad1204_all.png';
    } else {
        root.style.setProperty('--bg', '#f0f0f5');
        root.style.setProperty('--card-bg', 'rgba(0,0,0,0.03)');
        root.style.setProperty('--text', '#1a1a1a');
        root.style.setProperty('--text-dim', '#888');
        document.getElementById('deviceImg').src = 'plugin_imgs/main_charger_light_ad1204_all.png';
    }
}

function renderPorts() {
    const container = document.getElementById('portCards');
    let html = '';
    for (const [key, port] of Object.entries(state.ports)) {
        const cfg = PORT_CONFIG[key];
        const isActive = port.w > 0;
        const usbImg = cfg.usbType === 'c'
            ? '<img src="plugin_imgs/main_card_usb_c_rectangle.png" class="port-card-bg" alt="">'
            : '<img src="plugin_imgs/main_card_usb_a_rectangle.png" class="port-card-bg" alt="">';
        const portIcon = isActive
            ? `<img src="plugin_imgs/main_card_port_${key}_on.png" alt="">`
            : `<img src="plugin_imgs/main_card_port_${key}_off.png" alt="">`;

        let deviceIconsHtml = '';
        if (port.devices && port.devices.length > 0) {
            port.devices.forEach(d => {
                const iconSuffix = state.darkMode ? 'dark' : 'light';
                deviceIconsHtml += `<img src="plugin_imgs/main_charger_${iconSuffix}_${d}.png" alt="${d}">`;
            });
        } else {
            // Show faded icons for inactive
            const iconSuffix = state.darkMode ? 'dark' : 'light';
            deviceIconsHtml += `<img src="plugin_imgs/main_charger_${iconSuffix}_phone.png" class="inactive" alt="">`;
        }

        html += `
        <div class="port-card ${isActive ? 'active' : ''}" style="border-left: 3px solid ${isActive ? cfg.color : 'transparent'};">
            ${usbImg}
            <div class="port-card-overlay"></div>
            <div class="port-card-inner">
                <div class="port-card-port-icon">${portIcon}</div>
                <div class="port-card-info">
                    <div class="port-card-name" style="color:${isActive ? cfg.color : 'inherit'}">${cfg.name}</div>
                    <div class="port-card-stats">
                        <span class="${isActive ? 'stat-highlight' : ''}">${port.v.toFixed(1)}V</span>
                        <span>·</span>
                        <span class="${port.a > 0 ? 'stat-highlight' : ''}">${port.a.toFixed(1)}A</span>
                        <div class="connected-devices">${deviceIconsHtml}</div>
                    </div>
                </div>
                <div class="port-card-status">
                    <span class="port-card-protocol ${port.protocol}">${port.protocol.toUpperCase()}</span>
                    <span class="port-card-watts" style="color:${isActive ? cfg.color : 'var(--text-dim)'}">${port.w.toFixed(1)}W</span>
                </div>
            </div>
        </div>`;
    }
    container.innerHTML = html;
}

function updateChargingState() {
    // Check if any port is charging
    let totalPower = 0;
    for (const port of Object.values(state.ports)) {
        totalPower += port.w;
    }
    state.isCharging = totalPower > 0;
    state.totalPower = totalPower;

    // Update device image animation
    const wrap = document.getElementById('deviceImgWrap');
    const badge = document.getElementById('powerBadge');
    const rings = document.querySelectorAll('.ellipse-ring');

    if (state.isCharging) {
        wrap.classList.add('charging');
        badge.classList.add('visible');
        rings.forEach(r => r.classList.add('charging'));
    } else {
        wrap.classList.remove('charging');
        badge.classList.remove('visible');
        rings.forEach(r => r.classList.remove('charging'));
    }

    document.getElementById('totalPowerVal').textContent = totalPower.toFixed(1);
    document.getElementById('simChargeBtn').textContent = state.isCharging ? '停止充电' : '开始充电';
}

function renderScene() {
    const mode = SCENE_MODES[state.scene];
    document.getElementById('modeBannerText').textContent = mode.name;
    document.getElementById('modeBannerSub').textContent = mode.desc;
    document.getElementById('modeBannerIcon').src = `plugin_imgs/main_card_scene_icon_${mode.icon}.png`;

    // Update scene selector active state
    document.querySelectorAll('.scene-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === state.scene);
    });

    // Update scene device images based on mode
    const sceneImgs = {
        ai:      'ai',
        digital: 'mac',
        single:  'single',
        balance: 'balance'
    };
    const sceneImg = sceneImgs[state.scene];
    const suffix = sceneImg === state.scene ? '_on' : '_off';
    document.querySelectorAll('.scene-btn').forEach(btn => {
        const mode = btn.dataset.mode;
        const imgMode = sceneImgs[mode];
        const modeActive = mode === state.scene;
        const theme = state.darkMode ? 'dark' : 'light';
        const img = btn.querySelector('img');
        if (img) {
            img.src = `plugin_imgs/main_charger_${theme}_${imgMode}_${modeActive ? 'on' : 'off'}.png`;
        }
    });
}

function refreshUI() {
    renderPorts();
    updateChargingState();
    renderScene();
}

// === Actions ===
function switchScene(mode) {
    state.scene = mode;
    refreshUI();
}

function cycleScenario() {
    state.scenarioIdx = (state.scenarioIdx + 1) % SCENARIOS.length;
    const scenario = SCENARIOS[state.scenarioIdx];
    state.ports = JSON.parse(JSON.stringify(scenario.ports));
    refreshUI();
}

function toggleCharging() {
    if (state.isCharging) {
        // Stop charging: set all ports to idle
        state.ports = JSON.parse(JSON.stringify(SCENARIOS[0].ports));
    } else {
        // Start charging: use a random active scenario
        const activeScenarios = SCENARIOS.slice(1);
        const idx = Math.floor(Math.random() * activeScenarios.length);
        state.ports = JSON.parse(JSON.stringify(activeScenarios[idx].ports));
    }
    refreshUI();
}

function toggleDarkMode() {
    state.darkMode = !state.darkMode;
    applyDarkMode();
    refreshUI();
}

// === Init ===
applyDarkMode();
refreshUI();
</script>

</body>
</html>
