- button:
    - name: "BLE 服务启动"
      icon: "mdi:play"
      press:
        - service: shell_command.cuktech_start
    - name: "BLE 服务停止"
      icon: "mdi:stop"
      press:
        - service: shell_command.cuktech_stop
    - name: "BLE 服务重启"
      icon: "mdi:restart"
      press:
        - service: shell_command.cuktech_restart
